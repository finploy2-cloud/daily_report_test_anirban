name: Daily Automation

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST (UTC+5:30)
  workflow_dispatch:       # allows manual trigger too

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python your_script.py
```
> Replace `your_script.py` with your actual filename

---

**Step 7: Add a requirements.txt (if your program uses libraries)**

Create a `requirements.txt` file listing your libraries, e.g.:
```
requests
pandas
selenium
